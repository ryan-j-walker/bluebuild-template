---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
# image will be published to ghcr.io/<user>/<name>
name: silverblue

description: Universal Blue's silverblue-main with my tweaks.

base-image: ghcr.io/ublue-os/silverblue-main
image-version: latest

modules:
  - type: files
    files:
      - source: system/shared
        destination: /

  - from-file: common-recipes/fonts.yml
  - from-file: common-recipes/packages.yml
  - from-file: common-recipes/homebrew.yml
  - from-file: silverblue/gnome-extensions.yml
  - from-file: common-recipes/flatpaks.yml
  - from-file: common-recipes/systemd.yml
  
  - type: script
    scripts:
      - common-scripts/cleanup.sh

  - type: signing # this sets up the proper policy & signing files for signed images to work fully